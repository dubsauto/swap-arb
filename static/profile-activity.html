<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Activity</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/assets/ui.css">

  <style>
    .ui-activity-card, .ui-activity-item {
      background: rgba(15,22,32,.55);
      border: 1px solid rgba(255,255,255,.08);
    }

    /* User row: info card + account card side by side */
    .user-row {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 10px;
      margin-bottom: 10px;
      align-items: start;
    }

    /* Account card */
    .acct-card {
      background: rgba(255,255,255,.055);
      border: 1px solid rgba(32,227,255,.18);
      border-left: 3px solid rgba(32,227,255,.55);
      border-radius: 10px;
      padding: 12px 14px;
      min-height: 110px;
      backdrop-filter: blur(6px);
      box-shadow: 0 2px 16px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.06);
    }

    /* Slot tabs */
    .slot-tabs {
      display: flex;
      gap: 5px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .slot-tab {
      padding: 3px 12px;
      border-radius: 20px;
      border: 1px solid rgba(32,227,255,.22);
      background: transparent;
      color: rgba(214,226,240,.55);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .15s, border-color .15s, color .15s, box-shadow .15s;
    }

    .slot-tab.active {
      background: rgba(32,227,255,.12);
      border-color: rgba(32,227,255,.6);
      color: #20e3ff;
      box-shadow: 0 0 8px rgba(32,227,255,.2);
    }

    .slot-tab:hover:not(.active) {
      background: rgba(255,255,255,.04);
      border-color: rgba(255,255,255,.25);
      color: var(--text, #d6e2f0);
    }

    /* Section heading inside card */
    .acct-section-title {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: .09em;
      text-transform: uppercase;
      color: rgba(32,227,255,.55);
      margin-bottom: 6px;
      grid-column: 1 / -1;
    }

    .acct-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 14px;
    }

    .acct-row {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .acct-label {
      font-size: 9px;
      font-weight: 700;
      opacity: .4;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .acct-val {
      font-weight: 700;
      font-size: 12px;
      color: var(--text, #d6e2f0);
      line-height: 1.3;
    }

    .acct-val.green  { color: #2ef2a1; }
    .acct-val.red    { color: #ff4d5e; }
    .acct-val.cyan   { color: #20e3ff; }
    .acct-val.muted  { opacity: .38; font-weight: 500; }

    /* Divider between sections */
    .acct-divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,.07);
      margin: 4px 0;
      grid-column: 1 / -1;
    }

    /* Live metrics table — M/S rows */
    .lm-block {
      grid-column: 1 / -1;
      background: rgba(32,227,255,.04);
      border: 1px solid rgba(32,227,255,.1);
      border-radius: 6px;
      padding: 8px 10px;
      display: grid;
      grid-template-columns: 18px 1fr 1fr 1fr;
      gap: 0 6px;
    }

    .lm-block-divider {
      grid-column: 1 / -1;
      border: none;
      border-top: 1px solid rgba(255,255,255,.06);
      margin: 6px 0;
    }

    /* Row-side label: M or S */
    .lm-side {
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .02em;
      display: flex;
      align-items: flex-end;
      padding-bottom: 4px;
    }
    .lm-side.m { color: #20e3ff; }
    .lm-side.s { color: #2ef2a1; }

    /* Column: header label on top, value box below */
    .lm-col {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .lm-col-hdr {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      opacity: .38;
    }

    .lm-val {
      font-size: 12px;
      font-weight: 700;
      color: var(--text, #d6e2f0);
      padding-bottom: 3px;
      border-bottom: 1px solid rgba(255,255,255,.14);
    }

    .lm-val.green  { color: #2ef2a1; }
    .lm-val.red    { color: #ff4d5e; }
    .lm-val.cyan   { color: #20e3ff; }
    .lm-val.muted  { opacity: .35; font-weight: 500; }

    .acct-loading {
      font-size: 11px;
      opacity: .45;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 0;
    }

    .metrics-spinner {
      display: inline-block;
      width: 10px; height: 10px;
      border: 2px solid rgba(32,227,255,.15);
      border-top-color: #20e3ff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="ui-body ui-dashboard-page ui-activity-page">

<div class="ui-shell">

  <!-- Sidebar -->
  <aside class="ui-sidebar">
    <nav class="ui-nav">
      <a class="ui-nav-item" href="/app"><span class="ui-ico ui-ico-badge">D</span> Dashboard - hub</a>
      <a class="ui-nav-item" href="/mt5-connect"><span class="ui-ico ui-ico-badge">M</span> MT5 - login & Connect</a>
      
      <a class="ui-nav-item ui-nav-item-book" href="/profile-manage">
        <span class="ui-ico ui-ico-badge">P</span>
        <span class="ui-nav-text">Profile Manage - 🔰</span>
      </a>
      
      <a class="ui-nav-item ui-nav-item-book active" href="/profile-activity">
        <span class="ui-ico ui-ico-badge">A</span>
        <span class="ui-nav-text">Profile Activity - 🔰</span>
      </a>

      <a class="ui-nav-item" href="#" id="logoutBtn">
        <span class="ui-ico ui-ico-badge">L</span> Logout - to account
      </a>
    </nav>
  </aside>

  <main class="ui-main">
    <header class="ui-topbar">
      <div>
        <div class="ui-h1">Activity Monitor</div>
        <div class="ui-sub">Live user presence and recent actions</div>
      </div>
      <div class="ui-top-right ms-auto">
        <div class="ui-pill ui-pill-equal">
          <span class="ui-dot online ui-activity-dot"></span>
          <span id="activeCount">0 Active Now</span>
        </div>
      </div>
    </header>

    <div class="ui-activity-content">

      <!-- Active Now -->
      <section class="ui-panel">
        <div class="ui-panel-title">Active Now</div>
        <div id="activeNowContainer">
          <div class="ui-footnote">Loading active users...</div>
        </div>

        <div class="ui-panel-title mt-4">Recently Offline</div>
        <div id="offlineContainer">
          <div class="ui-footnote">No offline users recorded yet.</div>
        </div>
      </section>

      <!-- Recent History -->
      <section class="ui-panel">
        <div class="ui-panel-title">Recent History</div>
        
        <div class="d-flex gap-3 mb-3">
          <select id="hoursFilter" class="ui-select" style="width: 140px;">
            <option value="6">Last 6 hours</option>
            <option value="12">Last 12 hours</option>
            <option value="24" selected>Last 24 hours</option>
            <option value="48">Last 48 hours</option>
          </select>
          <button id="refreshBtn" class="ui-btn">Refresh</button>
        </div>

        <div id="historyContainer" class="ui-activity-list">
          <!-- Populated by JS -->
        </div>
      </section>

    </div>
  </main>
</div>

<script>
const token = localStorage.getItem("token");
if (!token) window.location.href = "/";

async function releaseAdminSession() {
  try {
    await fetch("/admin/session/release", {
      method: "POST",
      headers: { "Authorization": `Bearer ${token}` },
      keepalive: true,
    });
  } catch (_) {}
}

document.getElementById("logoutBtn").addEventListener("click", async () => {
  await releaseAdminSession();
  await fetch("/logout", { method: "POST", headers: { "Authorization": `Bearer ${token}` } }).catch(() => {});
  localStorage.removeItem("token");
  window.location.href = "/";
});

// Destroy MetaAPI session when admin navigates away or closes the tab
window.addEventListener("beforeunload", () => {
  releaseAdminSession();
});

// Also catch tab hidden (mobile, switching tabs) — belt and suspenders
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "hidden") releaseAdminSession();
});

async function loadActivity(hours = 24) {
  try {
    const res = await fetch(`/admin/activity?hours=${hours}`, {
      headers: { "Authorization": `Bearer ${token}` }
    });

    if (res.status === 403) {
      alert("Admin access only");
      window.location.href = "/app";
      return;
    }

    const data = await res.json();

    // Active Now
    renderActiveNow(data.active_now || []);
    
    // Offline
    renderOffline(data.offline || []);
    
    // History
    renderHistory(data.history || []);

    document.getElementById("activeCount").textContent = `${data.active_count || 0} Active Now`;

  } catch (err) {
    console.error(err);
  }
}

// slot data cache: userId → { slots: [...], selectedSlotId }
const _slotCache = {};

function renderActiveNow(users) {
  const container = document.getElementById("activeNowContainer");
  if (users.length === 0) {
    container.innerHTML = `<div class="ui-footnote">No users are currently active.</div>`;
    return;
  }

  let html = ``;
  users.forEach(u => {
    html += `
      <div class="user-row">
        <div class="ui-activity-card" style="border-radius:10px;padding:12px 14px">
          <div class="ui-activity-user">
            <span class="ui-activity-dot"></span>
            <span>${esc(u.username)}</span>
            <span class="ui-activity-badge ${u.role === 'admin' ? 'badge-auth' : 'badge-view'}">${u.role}</span>
          </div>
          <div class="ui-activity-meta" style="margin-top:6px">Page: <strong>${esc(u.page || 'dashboard')}</strong></div>
          <div class="ui-activity-meta">Last action: <strong>${esc(u.action || 'heartbeat')}</strong></div>
          <div class="ui-activity-meta">Last seen: <strong style="color:#5ac975">Active</strong></div>
        </div>
        <div class="acct-card" id="acct-${u.user_id}">
          <div class="acct-loading"><span class="metrics-spinner"></span> Loading slots…</div>
        </div>
      </div>`;
  });
  container.innerHTML = html;

  // Load slot info for each user
  users.forEach(u => {
    if (u.user_id) loadSlotInfo(u.user_id);
  });
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function loadSlotInfo(userId) {
  const card = document.getElementById(`acct-${userId}`);
  if (!card) return;
  try {
    const res = await fetch(`/admin/users/${userId}/slot-info`, {
      headers: { "Authorization": `Bearer ${token}` }
    });
    const data = await res.json();
    const slots = data.slots || [];
    _slotCache[userId] = { slots, selectedSlotId: null };

    if (!slots.length) {
      card.innerHTML = `<div class="acct-loading" style="opacity:.4">No slots provisioned</div>`;
      return;
    }

    renderSlotCard(userId, slots[0].slot_id);
  } catch (e) {
    card.innerHTML = `<div class="acct-loading" style="color:#e05656">Failed to load slots</div>`;
  }
}

function renderSlotCard(userId, slotId) {
  const card = document.getElementById(`acct-${userId}`);
  if (!card) return;
  const cache = _slotCache[userId];
  if (!cache) return;

  cache.selectedSlotId = slotId;
  const slot = cache.slots.find(s => s.slot_id === slotId);
  if (!slot) return;

  // Build tab row
  const tabsHtml = cache.slots.map(s => `
    <button class="slot-tab ${s.slot_id === slotId ? 'active' : ''}"
      onclick="renderSlotCard(${userId}, ${s.slot_id}); fetchLiveMetrics(${userId}, ${s.slot_id})">
      Slot ${s.slot_number}
    </button>`).join('');

  const m = slot.master;
  const s = slot.slave;

  const stateColor = (st) => {
    if (!st) return 'muted';
    return st.toLowerCase() === 'deployed' ? 'green' : 'red';
  };

  card.innerHTML = `
    <div class="slot-tabs">${tabsHtml}</div>
    <div class="acct-grid">

      <div class="acct-section-title">Infrastructure</div>
      <div class="acct-row">
        <span class="acct-label">VPS Host</span>
        <span class="acct-val ${slot.vps_host ? 'cyan' : 'muted'}">${esc(slot.vps_host || '—')}</span>
      </div>
      <div class="acct-row">
        <span class="acct-label">Slot Status</span>
        <span class="acct-val ${slot.status === 'provisioned' ? 'green' : ''}">${esc(slot.status || '—')}</span>
      </div>

      <hr class="acct-divider">
      <div class="acct-section-title">Accounts</div>

      <div class="acct-row">
        <span class="acct-label">Master Login</span>
        <span class="acct-val ${stateColor(m.state)}">${esc(m.login ?? '—')}</span>
      </div>
      <div class="acct-row">
        <span class="acct-label">Master Broker</span>
        <span class="acct-val">${esc(m.broker || '—')}</span>
      </div>
      <div class="acct-row">
        <span class="acct-label">Slave Login</span>
        <span class="acct-val ${stateColor(s.state)}">${esc(s.login ?? '—')}</span>
      </div>
      <div class="acct-row">
        <span class="acct-label">Slave Broker</span>
        <span class="acct-val">${esc(s.broker || '—')}</span>
      </div>

      <hr class="acct-divider">
      <div class="acct-section-title">Live Metrics</div>

      <div class="lm-block" style="grid-column:1/-1">

        <!-- Master row -->
        <div class="lm-side m">M</div>
        <div class="lm-col">
          <span class="lm-col-hdr">Balance</span>
          <span class="lm-val muted" id="metric-master-balance-${slotId}">—</span>
        </div>
        <div class="lm-col">
          <span class="lm-col-hdr">Equity</span>
          <span class="lm-val muted" id="metric-master-equity-${slotId}">—</span>
        </div>
        <div class="lm-col">
          <span class="lm-col-hdr">Latency</span>
          <span class="lm-val muted" id="metric-master-latency-${slotId}">—</span>
        </div>

        <hr class="lm-block-divider">

        <!-- Slave row -->
        <div class="lm-side s">S</div>
        <div class="lm-col">
          <span class="lm-col-hdr">Balance</span>
          <span class="lm-val muted" id="metric-slave-balance-${slotId}">—</span>
        </div>
        <div class="lm-col">
          <span class="lm-col-hdr">Equity</span>
          <span class="lm-val muted" id="metric-slave-equity-${slotId}">—</span>
        </div>
        <div class="lm-col">
          <span class="lm-col-hdr">Latency</span>
          <span class="lm-val muted" id="metric-slave-latency-${slotId}">—</span>
        </div>

      </div>

      <div id="metric-status-${slotId}" style="grid-column:1/-1;display:flex;align-items:center;gap:5px;font-size:10px;opacity:.5;margin-top:4px">
        <span class="metrics-spinner"></span> connecting…
      </div>

    </div>`;

  fetchLiveMetrics(userId, slotId);
}

async function fetchLiveMetrics(userId, slotId) {
  const statusEl = document.getElementById(`metric-status-${slotId}`);

  const applyMetrics = (side, data) => {
    const set = (field, val, cls) => {
      const el = document.getElementById(`metric-${side}-${field}-${slotId}`);
      if (!el) return;
      el.className = `lm-val ${cls}`;
      el.textContent = val;
    };

    const fmt = v => v != null
      ? `$${Number(v).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}`
      : '—';

    if (!data || data.error) {
      set('balance', data?.error || 'n/a', 'muted');
      set('equity',  '—', 'muted');
      set('latency', '—', 'muted');
      return;
    }

    set('balance', fmt(data.balance), '');
    set('equity',  fmt(data.equity),
        data.equity != null && data.balance != null && data.equity < data.balance ? 'red' : 'green');
    set('latency', data.latency_ms != null ? `${data.latency_ms} ms` : '—', 'cyan');
  };

  try {
    const res = await fetch(`/admin/slots/${slotId}/live-metrics`, {
      headers: { "Authorization": `Bearer ${token}` }
    });
    const d = await res.json();

    applyMetrics('master', d.master);
    applyMetrics('slave',  d.slave);
    if (statusEl) statusEl.style.display = 'none';
  } catch (e) {
    if (statusEl) statusEl.innerHTML = `<span style="color:#ff4d5e">fetch error</span>`;
  }
}

function renderOffline(users) {
  const container = document.getElementById("offlineContainer");
  if (users.length === 0) {
    container.innerHTML = `<div class="ui-footnote">No recently offline users.</div>`;
    return;
  }

  let html = `<div class="ui-activity-list">`;
  users.forEach(u => {
    html += `
      <div class="ui-activity-item">
        <span class="ui-activity-badge ${u.role === 'admin' ? 'badge-auth' : 'badge-view'}">${u.username}</span>
        <div class="ui-activity-item-meta">
          <div>Last seen: ${u.last_seen_ago || 'Unknown'}</div>
          <div class="ui-footnote">Last page: ${u.page || '-'}</div>
        </div>
      </div>`;
  });
  html += `</div>`;
  container.innerHTML = html;
}
function startHeartbeat(pageName) {
  setInterval(() => {
    fetch("admin/activity/heartbeat", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + token,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        page: pageName,
        action: "heartbeat"
      })
    });
  }, 15000);
}

function renderHistory(logs) {
  const container = document.getElementById("historyContainer");
  if (logs.length === 0) {
    container.innerHTML = `<div class="ui-footnote">No activity recorded yet.</div>`;
    return;
  }

  let html = "";
  logs.forEach(log => {
    html += `
      <div class="ui-activity-item">
        <span class="ui-activity-badge badge-view">${log.action || 'Activity'}</span>
        <div class="ui-activity-item-meta">
          <div><strong>${log.username}</strong> on ${log.page || 'dashboard'}</div>
          <div class="ui-footnote">${log.time_ago || ''}</div>
        </div>
      </div>`;
  });
  container.innerHTML = html;
}

// Event listeners
document.getElementById("refreshBtn").addEventListener("click", () => {
  const hours = parseInt(document.getElementById("hoursFilter").value);
  loadActivity(hours);
});

document.getElementById("hoursFilter").addEventListener("change", () => {
  const hours = parseInt(document.getElementById("hoursFilter").value);
  loadActivity(hours);
});

// Initial load
loadActivity(24);
startHeartbeat("dashboard");
</script>

</body>
</html>
